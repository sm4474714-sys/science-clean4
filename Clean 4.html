<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>النظام الرقمي لتقييم نظافة المعامل والمدرجات</title>
    <style>
        :root { --primary-color: #3498db; --secondary-color: #2ecc71; --danger-color: #e74c3c; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; background: white; margin: auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; margin-bottom: 5px; font-size: 24px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 30px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        
        .form-box { background: #fdfdfd; border: 1px solid #edf2f7; padding: 20px; border-radius: 12px; margin-bottom: 30px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap; }
        .col { flex: 1; min-width: 200px; text-align: right; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #4a5568; }
        select, input { width: 100%; padding: 12px; border: 1px solid #cbd5e0; border-radius: 8px; font-size: 15px; background: white; }
        
        .btn-submit { background: var(--primary-color); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-submit:hover { background: #2980b9; }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-top: 40px; margin-bottom: 15px; }
        .action-btns { display: flex; gap: 10px; }
        .btn-excel { background: var(--secondary-color); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-clear { background: var(--danger-color); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; font-size: 14px; }
        th { background: #2c3e50; color: white; padding: 12px; text-align: center; }
        td { border-bottom: 1px solid #eee; padding: 12px; text-align: center; color: #4a5568; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .no-data { text-align: center; padding: 20px; color: #a0aec0; }
    </style>
</head>
<body>

<div class="container">
    <h1>النظام الرقمي لتقييم نظافة المعامل والمدرجات</h1>
    <p class="subtitle">إشراف: د. أية عبد العزيز | قسم المتابعة اليومية</p>

    <div class="form-box">
        <div class="row">
            <div class="col">
                <label>نوع المرفق</label>
                <select id="facilityType">
                    <option value="">-- اختر --</option>
                    <option>معامل الفيزياء</option>
                    <option>معامل الكيمياء</option>
                    <option>معامل الحيوان</option>
                    <option>معامل الحاسب الآلي 💻</option>
                    <option>المدرجات الدراسية</option>
                    <option>المجمعات التعليمية 🏢</option>
                </select>
            </div>
            <div class="col">
                <label>حالة النظافة</label>
                <select id="status">
                    <option value="">-- التقييم --</option>
                    <option>ممتاز ✅</option>
                    <option>جيد جداً 👍</option>
                    <option>يحتاج تنظيف ⚠️</option>
                    <option>سيء جداً ❌</option>
                </select>
            </div>
        </div>
        <div class="col" style="margin-bottom: 15px;">
            <label>اسم أو رقم المرفق</label>
            <input type="text" id="facilityName" placeholder="مثال: معمل حاسب 2 أو مجمع 1">
        </div>
        <button class="btn-submit" onclick="addEntry()">تسجيل التقرير بالنظام</button>
    </div>

    <div class="table-header">
        <div class="action-btns">
            <button class="btn-clear" onclick="clearLogs()">مسح السجل</button>
            <button class="btn-excel" onclick="exportToExcel()">استخراج كملف Excel</button>
        </div>
        <h2 style="margin: 0; font-size: 20px;">سجل المتابعة اليومي</h2>
    </div>

    <table>
        <thead>
            <tr>
                <th>الوقت والتاريخ</th>
                <th>النوع</th>
                <th>اسم المرفق</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td colspan="4" class="no-data">لا توجد تقارير مسجلة حالياً.</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    let reports = [];

    function addEntry() {
        const type = document.getElementById('facilityType').value;
        const status = document.getElementById('status').value;
        const name = document.getElementById('facilityName').value;
        const time = new Date().toLocaleString('ar-EG');

        if (!type || !status || !name) {
            alert("برجاء إكمال جميع البيانات");
            return;
        }

        const report = { time, type, name, status };
        reports.push(report);
        updateTable();

        // مسح الخانات بعد التسجيل لسهولة الإدخال مرة أخرى
        document.getElementById('facilityName').value = "";
    }

    function updateTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        if (reports.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" class="no-data">لا توجد تقارير مسجلة حالياً.</td></tr>';
            return;
        }

        reports.forEach((r) => {
            const row = `<tr>
                <td>${r.time}</td>
                <td>${r.type}</td>
                <td>${r.name}</td>
                <td>${r.status}</td>
            </tr>`;
            // إضافة السجل الجديد في أعلى الجدول
            tbody.innerHTML = row + tbody.innerHTML;
        });
    }

    function clearLogs() {
        if (confirm("هل أنت متأكد من مسح جميع البيانات المسجلة في السجل؟")) {
            reports = [];
            updateTable();
        }
    }

    function exportToExcel() {
        if (reports.length === 0) { alert("السجل فارغ! قم بتسجيل تقرير أولاً."); return; }
        let csv = "\uFEFFالوقت والتاريخ,النوع,اسم المرفق,الحالة\n";
        reports.forEach(r => {
            csv += `${r.time},${r.type},${r.name},${r.status}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "تقرير_نظافة_كلية_العلوم.csv";
        link.click();
    }
</script>

</body>
</html>
